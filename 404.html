<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Gravity Shift</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container {
            padding: 20px;
        }
        h1 {
            font-size: 6rem;
            margin: 0 0 10px 0;
            color: #008CFF;
        }
        h2 {
            font-size: 2rem;
            margin: 0 0 20px 0;
        }
        p {
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background-color: #008CFF;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .home-link:hover {
            background-color: #0074d9;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404 Error</h1>
        <h2>Uh oh!</h2>
        <p>Either this page doesn't exist, has been moved, or ~~J.J. sucks at coding~~.</p>
        <a href="/" class="home-link">Back to Homepages</a>
    </div>
</body>
</html>
