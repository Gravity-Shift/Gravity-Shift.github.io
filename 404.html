<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Gravity Shift</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #121212;
            --subtext-color: #666666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --subtext-color: #b3b3b3;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            transition: background-color 0.3s, color 0.3s; 
        }
        .error-container {
            padding: 20px;
        }
        h1 {
            font-size: 6rem;
            margin: 0 0 10px 0;
            color: #ff0000;
        }
        h2 {
            font-size: 2rem;
            margin: 0 0 20px 0;
        }
        p {
            color: var(--subtext-color);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff0000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .home-link:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404 Error</h1>
        <h2>Uh oh!</h2>
        <p>The page you are looking for either doesn't exist, has been moved, or <del>J.J. sucks at coding</del>. Please try again later. </p>
        <a href="/" class="home-link">Back to Homepage</a>
    </div>
</body>
</html>
