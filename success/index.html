<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - Gravity Shift</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --desc-color: #333333;
            --toggle-bg: #000000;
            --toggle-text: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --desc-color: #a0aec0;
            --toggle-bg: #ffffff;
            --toggle-text: #000000;
            --nav-bg: rgba(18, 18, 18, 0.8);
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 150px;
            padding-bottom: 80px;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; z-index: 90;
            background-color: var(--nav-bg); backdrop-filter: blur(5px);
        }
        .nav-links { display: flex; gap: 20px; align-items: center; margin-right: 140px; }
        .nav-links a {
            color: var(--text-color); text-decoration: none; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
        }
        .theme-toggle-btn {
            position: fixed; top: 15px; right: 20px; z-index: 100;
            background-color: var(--toggle-bg); color: var(--toggle-text);
            border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer;
            font-family: Arial, sans-serif; font-weight: bold; font-size: 0.9rem;
        }
        .success-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        i.fa-circle-check { font-size: 4rem; color: #4bb543; margin-bottom: 20px; }
        h2 { font-size: 2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; }
        .btn-home {
            display: inline-block; margin-top: 30px; background-color: var(--toggle-bg); 
            color: var(--toggle-text); text-decoration: none; padding: 12px 25px; 
            border-radius: 4px; font-family: Arial, sans-serif; font-weight: bold; text-transform: uppercase;
        }
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000000;
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .footer-text { color: #ffffff; }
        .social-links a { color: #ffffff; margin-left: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="themeToggle">Dark Mode</button>
    <nav>
        <div></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="https://bbaitmusicstudios.mlswebstores.com/product-category/apparel/page/2/" target="_blank">Merch</a>
            <a href="/shows/">Shows</a>
            <a href="/meet/">Meet The Band</a>
            <a href="/contact/">Contact</a>
        </div>
    </nav>

    <div class="success-container">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Thank you for sending us your message! <br>We will read it, and get back to you as soon as we can!</h2>
        <a href="/" class="btn-home">Back To Homepage</a>
    </div>

    <footer>
        <div class="footer-text">Follow us!</div>
        <div class="social-links">
            <a href="https://www.instagram.com/gravity.shift.band/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/p/Gravity-Shift-Rock-Band-61572665002330/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.textContent = 'Light Mode';
        }

        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                toggleBtn.textContent = 'Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = 'Light Mode';
                localStorage.setItem('theme', 'dark'); 
            }
        });
    </script>
</body>
</html>
