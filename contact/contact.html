<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Gravity Shift</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --desc-color: #333333;
            --toggle-bg: #000000;
            --toggle-text: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-color: #eaeaea;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --desc-color: #a0aec0;
            --toggle-bg: #ffffff;
            --toggle-text: #000000;
            --nav-bg: rgba(18, 18, 18, 0.8);
            --border-color: #2d3748;
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 120px;
            padding-bottom: 120px;
            transition: background-color 0.3s, color 0.3s;
        }
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; z-index: 90;
            background-color: var(--nav-bg); backdrop-filter: blur(5px);
            transition: background-color 0.3s;
        }
        .nav-links { display: flex; gap: 20px; align-items: center; margin-right: 140px; }
        .nav-links a {
            color: var(--text-color); text-decoration: none; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold; transition: opacity 0.3s;
        }
        .nav-links a:hover { opacity: 0.6; }
        .theme-toggle-btn {
            position: fixed; top: 15px; right: 20px; z-index: 100;
            background-color: var(--toggle-bg); color: var(--toggle-text);
            border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer;
            font-family: Arial, sans-serif; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.3s, color 0.3s;
        }
        section { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        h2 { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        p { font-family: Arial, sans-serif; font-size: 1.1rem; line-height: 1.6; color: var(--desc-color); margin-bottom: 30px; text-align: center; }
        .contact-form { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; font-family: Arial, sans-serif; }
        .form-group label { font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .form-group input, .form-group textarea {
            padding: 12px; border: 1px solid var(--border-color); border-radius: 4px;
            background-color: var(--bg-color); color: var(--text-color); font-family: Arial, sans-serif; font-size: 1rem; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--toggle-bg); }
        .submit-btn {
            background-color: var(--toggle-bg); color: var(--toggle-text); border: none; padding: 15px;
            border-radius: 4px; font-size: 1rem; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: background-color 0.3s, opacity 0.3s;
        }
        .submit-btn:hover { opacity: 0.8; }
        .contact-phone { text-align: center; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border-color); }
        .contact-phone h4 { font-family: 'Arial Black', Gadget, sans-serif; text-transform: uppercase; margin-bottom: 5px; font-size: 1.1rem; }
        .contact-phone a { color: var(--text-color); text-decoration: none; font-size: 1.4rem; font-weight: bold; font-family: Arial, sans-serif; }
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000000;
            border-top: 1px solid #222; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center; z-index: 10;
        }
        .footer-text { color: #ffffff; font-size: 1rem; letter-spacing: 1px; }
        .social-links a { color: #ffffff; text-decoration: none; margin-left: 20px; font-size: 1.5rem; transition: opacity 0.3s; }
        .social-links a:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="themeToggle">Dark Mode</button>
    <nav>
        <div></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="https://bbaitmusicstudios.mlswebstores.com/product-category/apparel/page/2/" target="_blank">Merch</a>
            <a href="shows.html">Shows</a>
            <a href="meet.html">Meet The Band</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <section>
        <h2>Contact</h2>
        <p>Got a question or want to book us for a show? Contact us by filling out the form below!</p>
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="99cf8e60-1770-48ee-a606-f643a824f879">
            
            <input type="hidden" name="redirect" value="https://gravity-shift.github.io/">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>
    <footer>
        <div class="footer-text">Follow us!</div>
        <div class="social-links">
            <a href="https://www.instagram.com/gravity.shift.band/" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/p/Gravity-Shift-Rock-Band-61572665002330/" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
        </div>
    </footer>
    <script>
        const toggleBtn = document.getElementById('themeToggle');
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                toggleBtn.textContent = 'Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = 'Light Mode';
            }
        });
    </script>
</body>
</html>
