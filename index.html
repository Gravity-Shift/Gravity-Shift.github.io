<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Shift (Home)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --desc-color: #333333;
            --toggle-bg: #000000;
            --toggle-text: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --desc-color: #a0aec0;
            --toggle-bg: #ffffff;
            --toggle-text: #000000;
            --nav-bg: rgba(18, 18, 18, 0.8);
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 80px; 
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            z-index: 90;
            background-color: var(--nav-bg);
            backdrop-filter: blur(5px);
            transition: background-color 0.3s;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-right: 140px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .theme-toggle-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 100;
            background-color: var(--toggle-bg);
            color: var(--toggle-text);
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s, color 0.3s;
        }

        .intro-container {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            transition: background-color 0.3s;
        }

        .logo-half {
            position: absolute;
            height: 500px; 
            width: auto;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-timing-function: ease-out;
        }

        .left-half {
            left: 0;
            transform: translateX(-100%);
            animation-name: slideInLeft;
        }

        .right-half {
            right: 0;
            transform: translateX(100%);
            animation-name: slideInRight;
        }

        @keyframes slideInLeft {
            to { left: calc(50% + 10px); transform: translateX(-100%); }
        }

        @keyframes slideInRight {
            to { right: calc(50% - 10px); transform: translateX(100%); }
        }

        .description-section {
            padding: 100px 20px 120px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description-section p {
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--desc-color);
            transition: color 0.3s;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            border-top: 1px solid #222;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .footer-text {
            color: #ffffff;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .social-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1.5rem;
            transition: opacity 0.3s;
        }

        .social-links a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <button class="theme-toggle-btn" id="themeToggle">Dark Mode</button>

    <nav>
        <div></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="https://bbaitmusicstudios.mlswebstores.com/product-category/apparel/page/2/" target="_blank">Merch</a>
            <a href="/shows/">Shows</a>
            <a href="/meet/">Meet The Band</a>
            <a href="/contact/">Contact</a>
        </div>
    </nav>

    <div class="intro-container">
        <img id="logoLeft" src="https://i.postimg.cc/YSKcp3qz/Gravity-light.png" alt="Logo Left" class="logo-half left-half">
        <img id="logoRight" src="https://i.postimg.cc/MG2kWDKb/Shift-light.png" alt="Logo Right" class="logo-half right-half">
    </div>

    <div class="description-section">
        <h2>About The Band</h2>
        <p>
            Hey there, if you wanna find my sunken treasure chest you'll have to try harder than that!
        </p>
    </div>

    <footer>
        <div class="footer-text">Follow us!</div>
        <div class="social-links">
            <a href="https://www.instagram.com/gravity.shift.band/" target="_blank" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/p/Gravity-Shift-Rock-Band-61572665002330/" target="_blank" aria-label="Facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const logoLeft = document.getElementById('logoLeft');
        const logoRight = document.getElementById('logoRight');

        const lightLogos = {
            left: "https://i.postimg.cc/YSKcp3qz/Gravity-light.png",
            right: "https://i.postimg.cc/MG2kWDKb/Shift-light.png"
        };

        const darkLogos = {
            left: "https://i.postimg.cc/ZqtkTcKc/Gravity-dark.png",
            right: "https://i.postimg.cc/wB8K6VT2/Shift-dark.png"
        };

        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                toggleBtn.textContent = 'Dark Mode';
                logoLeft.src = lightLogos.left;
                logoRight.src = lightLogos.right;
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = 'Light Mode';
                logoLeft.src = darkLogos.left;
                logoRight.src = darkLogos.right;
            }
        });
    </script>

</body>
</html>
