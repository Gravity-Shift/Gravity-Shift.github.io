<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Shift (Homepage)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
            padding-bottom: 60px; 
        }

        .intro-container {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .logo-half {
            position: absolute;
            height: 300px;
            width: auto;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-timing-function: ease-out;
        }

        .left-half {
            left: 0;
            transform: translateX(-100%);
            animation-name: slideInLeft;
        }

        .right-half {
            right: 0;
            transform: translateX(100%);
            animation-name: slideInRight;
        }

        @keyframes slideInLeft {
            to { left: 50%; transform: translateX(-100%); }
        }

        @keyframes slideInRight {
            to { right: 50%; transform: translateX(100%); }
        }

        .description-section {
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .description-section h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description-section p {
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ccc;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000;
            border-top: 1px solid #222;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .footer-text {
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #00ff66; 
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <img src="https://i.postimg.cc/gJC0VRY2/Gravity.png" alt="Logo Left" class="logo-half left-half">
        <img src="https://i.postimg.cc/XqKn9zH1/Shift.png" alt="Logo Right" class="logo-half right-half">
    </div>

    <div class="description-section">
        <h2>About The Band</h2>
        <p>
            Hey there, if you wanna find my sunken treasure chest you'll have to try harder than that!
        </p>
    </div>

    <footer>
        <div class="footer-text">follow us!</div>
        <div class="social-links">
            <a href="https://www.instagram.com/gravity.shift.band/" target="_blank">Instagram</a>
            <a href="https://www.facebook.com/p/Gravity-Shift-Rock-Band-61572665002330/" target="_blank">Facebook</a>
        </div>
    </footer>

</body>
</html>
